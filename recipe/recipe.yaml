schema_version: 1

context:
  version: "0.1.2"
  python_min: "3.11"

package:
  name: fastspec
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fastspec/fastspec-${{ version }}.tar.gz
  sha256: 57f2450c9d81c820fb9dd9ca6281ec8addee811426fd8049bbfd816bfc872f0b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - pip
  run:
    - python >=${{ python_min }}
    - fastcore >=1.14.6
    - httpx

tests:
  - python:
      imports:
        - fastspec
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Dynamic OpenAPI and discovery spec client for Python — turn any API spec into a fully-typed async client with attribute chaining, streaming, and file uploads
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/fastspec/
  documentation: https://AnswerDotAI.github.io/fastspec/

extra:
  recipe-maintainers:
    - thewchan
